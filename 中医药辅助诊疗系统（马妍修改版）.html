<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>本草问诊 · 中医药辅助诊疗系统 | 节气养生·雅致版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --primary-dark: #1a5a2a;
  --primary: #2d7a3a;
  --primary-light: #e8f5e9;
  --secondary: #b89a3a;
  --secondary-light: #fef8e7;
  --gray-bg: #f5f7f5;
  --gray-border: #e0e8e0;
  --text-dark: #1a2e1a;
  --text-gray: #5a6e5a;
  --text-light: #8aa08a;
  --white: #ffffff;
  --shadow: 0 4px 20px rgba(0,0,0,0.06);
  --shadow-hover: 0 8px 30px rgba(0,0,0,0.1);
  --radius: 16px;
  --radius-sm: 10px;
}

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--gray-bg);
  color: var(--text-dark);
  line-height: 1.5;
}

.header {
  background: var(--primary-dark);
  padding: 0 32px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
}

.logo-icon {
  width: 36px;
  height: 36px;
  background: var(--primary);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}

.logo-text {
  font-family: 'Noto Serif SC', serif;
  font-size: 20px;
  font-weight: 700;
  color: white;
  letter-spacing: 2px;
}

.logo-sub {
  font-size: 10px;
  color: rgba(255,255,255,0.5);
}

.header-search {
  flex: 1;
  max-width: 480px;
  position: relative;
  margin: 0 24px;
}

.header-search input {
  width: 100%;
  height: 40px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 30px;
  padding: 0 44px 0 18px;
  font-size: 14px;
  color: white;
  outline: none;
}

.header-search input::placeholder {
  color: rgba(255,255,255,0.5);
}

.header-search input:focus {
  background: rgba(255,255,255,0.15);
  border-color: var(--secondary);
}

.header-search button {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  width: 30px;
  height: 30px;
  background: var(--primary);
  border: none;
  border-radius: 50%;
  cursor: pointer;
  font-size: 14px;
  color: white;
}

.search-suggestions {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: white;
  border-radius: 12px;
  box-shadow: var(--shadow-hover);
  z-index: 1000;
  max-height: 300px;
  overflow-y: auto;
  display: none;
  margin-top: 4px;
}

.search-suggestions.show {
  display: block;
}

.suggestion-item {
  padding: 10px 16px;
  cursor: pointer;
  font-size: 14px;
  color: var(--text-dark);
  border-bottom: 1px solid var(--gray-border);
}

.suggestion-item:hover {
  background: var(--primary-light);
}

.nav-links {
  display: flex;
  gap: 8px;
}

.nav-link {
  padding: 6px 16px;
  border-radius: 20px;
  color: rgba(255,255,255,0.7);
  cursor: pointer;
  font-size: 14px;
  transition: all 0.2s;
}

.nav-link:hover, .nav-link.active {
  background: rgba(255,255,255,0.15);
  color: white;
}

.main-container {
  display: flex;
  max-width: 1400px;
  margin: 0 auto;
  padding: 24px 32px;
  gap: 32px;
}

.sidebar {
  width: 280px;
  flex-shrink: 0;
}

.health-tip-card {
  background: linear-gradient(135deg, var(--primary-light), var(--white));
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
  border: 1px solid var(--gray-border);
}

.health-tip-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--primary-dark);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.health-tip-content {
  font-size: 13px;
  line-height: 1.7;
  color: var(--text-gray);
}

.refresh-tip {
  background: none;
  border: none;
  color: var(--primary);
  font-size: 12px;
  cursor: pointer;
  margin-top: 10px;
  text-align: right;
  width: 100%;
}

.content {
  flex: 1;
  min-width: 0;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}

.stat-card {
  background: white;
  border-radius: var(--radius-sm);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  box-shadow: var(--shadow);
  border: 1px solid var(--gray-border);
}

.stat-icon {
  width: 48px;
  height: 48px;
  background: var(--primary-light);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}

.stat-number {
  font-family: 'Noto Serif SC', serif;
  font-size: 26px;
  font-weight: 700;
  color: var(--primary-dark);
  line-height: 1.2;
}

.stat-label {
  font-size: 12px;
  color: var(--text-gray);
}

.hot-search-section {
  background: white;
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 24px;
  box-shadow: var(--shadow);
  border: 1px solid var(--gray-border);
}

.hot-search-title {
  font-size: 13px;
  color: var(--text-gray);
  margin-bottom: 12px;
}

.hot-search-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.hot-search-item {
  background: var(--primary-light);
  color: var(--primary-dark);
  padding: 8px 20px;
  border-radius: 30px;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  border: none;
}

.hot-search-item:hover {
  background: var(--primary);
  color: white;
}

/* 节气推荐卡片样式 */
.jieqi-recommend-card {
  border-radius: 24px;
  overflow: hidden;
  margin-bottom: 28px;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
  box-shadow: var(--shadow-hover);
}
.jieqi-recommend-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 20px 30px rgba(0,0,0,0.15);
}
.recommend-overlay {
  background: linear-gradient(135deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.3) 100%);
  backdrop-filter: blur(2px);
  padding: 32px 28px;
}
.recommend-badge-date {
  font-size: 14px;
  letter-spacing: 1px;
  margin-bottom: 14px;
  display: inline-block;
  background: transparent;
  padding: 0;
  color: rgba(255,255,255,0.92);
  font-weight: 500;
  text-shadow: 0 1px 3px rgba(0,0,0,0.3);
}
.recommend-jieqi-name {
  font-family: 'Noto Serif SC', serif;
  font-size: 44px;
  font-weight: 800;
  color: white;
  text-shadow: 0 2px 12px rgba(0,0,0,0.35);
  margin: 12px 0 16px 0;
  line-height: 1.2;
  letter-spacing: 2px;
}
.recommend-feature-text {
  font-size: 16px;
  line-height: 1.6;
  color: rgba(255,255,255,0.96);
  text-shadow: 0 1px 3px rgba(0,0,0,0.3);
  max-width: 85%;
  margin-bottom: 32px;
  font-weight: 500;
}
.recommend-detail-btn {
  background: rgba(255,255,255,0.92);
  border: none;
  padding: 10px 28px;
  border-radius: 60px;
  font-size: 15px;
  font-weight: 700;
  color: var(--primary-dark);
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.recommend-detail-btn:hover {
  background: white;
  transform: scale(1.02);
}

.calendar-table {
  background: white;
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 24px;
  box-shadow: var(--shadow);
  border: 1px solid var(--gray-border);
}

.calendar-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--primary-dark);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--primary-light);
  flex-wrap: wrap;
  justify-content: space-between;
}
.calendar-title::before {
  content: '';
  display: none;
}

.jieqi-row {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 12px;
  margin-bottom: 12px;
}

.jieqi-cell {
  background: var(--gray-bg);
  border-radius: var(--radius-sm);
  padding: 14px 8px;
  cursor: pointer;
  transition: all 0.2s;
  border: 1px solid var(--gray-border);
  text-align: center;
}

.jieqi-cell:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-hover);
  border-color: var(--primary);
  background: white;
}

.jieqi-cell-name {
  font-family: 'Noto Serif SC', serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--primary-dark);
  margin-bottom: 6px;
}

.jieqi-cell-date {
  font-size: 11px;
  color: var(--text-gray);
}

.jieqi-cell.highlight {
  background: var(--secondary-light);
  border: 2px solid var(--secondary);
  box-shadow: 0 2px 8px rgba(184,154,58,0.2);
}

/* 节气详情页样式 */
.jieqi-detail {
  background: white;
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
}
.jieqi-header {
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  padding: 36px 32px;
  color: white;
}
.jieqi-detail-name {
  font-family: 'Noto Serif SC', serif;
  font-size: 36px;
  font-weight: 700;
  letter-spacing: 2px;
  margin-bottom: 12px;
}
.jieqi-detail-time {
  font-size: 15px;
  opacity: 0.9;
  margin-bottom: 20px;
}
.jieqi-detail-principle {
  background: rgba(255,255,255,0.18);
  padding: 14px 20px;
  border-radius: 40px;
  font-size: 15px;
  line-height: 1.5;
  display: inline-block;
}
.jieqi-detail-body {
  padding: 32px 36px;
}
.jieqi-section {
  margin-bottom: 32px;
  border-bottom: 1px solid var(--gray-border);
  padding-bottom: 24px;
}
.jieqi-section:last-child {
  border-bottom: none;
  margin-bottom: 0;
  padding-bottom: 0;
}
.jieqi-section-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--primary-dark);
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 10px;
  letter-spacing: 1px;
}
.jieqi-section-title::before {
  content: '';
  width: 5px;
  height: 22px;
  background: var(--primary);
  border-radius: 4px;
}
.detail-content {
  background: var(--gray-bg);
  padding: 18px 22px;
  border-radius: 18px;
  line-height: 1.75;
  font-size: 15px;
  color: var(--text-dark);
}
.foods-tag {
  display: inline-block;
  background: var(--primary-light);
  color: var(--primary-dark);
  padding: 6px 18px;
  border-radius: 40px;
  font-size: 14px;
  margin: 0 10px 12px 0;
  transition: all 0.2s;
}
.recipe-box {
  background: var(--secondary-light);
  padding: 18px 24px;
  border-radius: 20px;
  line-height: 1.7;
  font-size: 15px;
  color: #7a6300;
  border-left: 5px solid var(--secondary);
}
.warning-box {
  background: #fef7e0;
  border-left: 5px solid #e6a017;
  padding: 16px 22px;
  border-radius: 18px;
  font-size: 14px;
  color: #8a6e2e;
  line-height: 1.6;
}

/* 医案/方剂详情页样式 */
.case-detail-card, .formula-detail-card {
  background: white;
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
}
.case-header, .formula-header {
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  padding: 32px 28px;
  color: white;
}
.case-header .case-title, .formula-header .formula-name {
  font-family: 'Noto Serif SC', serif;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 1px;
}
.case-body, .formula-body {
  padding: 32px 32px;
}
.case-section, .formula-section {
  margin-bottom: 32px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--gray-border);
}
.case-section:last-child, .formula-section:last-child {
  border-bottom: none;
  margin-bottom: 0;
  padding-bottom: 0;
}
.case-section-title, .formula-section-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--primary-dark);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.case-section-title::before, .formula-section-title::before {
  content: '';
  width: 4px;
  height: 18px;
  background: var(--primary);
  border-radius: 2px;
}
.case-text {
  font-size: 15px;
  line-height: 1.75;
  color: var(--text-dark);
  background: var(--gray-bg);
  padding: 16px 20px;
  border-radius: 14px;
  margin-top: 4px;
}
.symptoms-text {
  font-size: 15px;
  line-height: 1.75;
  color: var(--text-dark);
  background: var(--gray-bg);
  padding: 16px 20px;
  border-radius: 14px;
  margin-top: 4px;
}
.herb-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 8px;
}
.herb-item {
  background: var(--primary-light);
  color: var(--primary-dark);
  padding: 8px 18px;
  border-radius: 40px;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.2s;
}
.herb-item:hover {
  background: var(--primary);
  color: white;
  transform: translateY(-1px);
}
.effect-text {
  font-size: 15px;
  line-height: 1.75;
  color: var(--text-dark);
  background: var(--gray-bg);
  padding: 16px 20px;
  border-radius: 14px;
}

.page { display: none; }
.page.active { display: block; }
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--primary-dark); color: white; padding: 10px 24px; border-radius: 30px; font-size: 14px; z-index: 2000; animation: fadeOut 2s ease forwards; }
@keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }

/* 我的页面 - 恢复原来的简洁卡片式布局 */
.profile-card {
  background: white;
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  border: 1px solid var(--gray-border);
}
.profile-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 20px 24px;
  border-bottom: 1px solid var(--gray-border);
  cursor: pointer;
  transition: background 0.2s;
}
.profile-item:last-child {
  border-bottom: none;
}
.profile-item:hover {
  background: var(--gray-bg);
}
.profile-icon {
  width: 48px;
  height: 48px;
  background: var(--primary-light);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}
.profile-info {
  flex: 1;
}
.profile-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-dark);
  margin-bottom: 4px;
}
.profile-desc {
  font-size: 12px;
  color: var(--text-gray);
}
.profile-arrow {
  font-size: 20px;
  color: var(--text-light);
}

/* 列表页面样式（收藏、历史） */
.list-page {
  background: white;
  border-radius: var(--radius);
  padding: 0;
  box-shadow: var(--shadow);
  border: 1px solid var(--gray-border);
  overflow: hidden;
}
.list-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--gray-border);
  cursor: pointer;
  transition: background 0.2s;
}
.list-item:last-child {
  border-bottom: none;
}
.list-item:hover {
  background: var(--gray-bg);
}
.list-item-content {
  flex: 1;
}
.list-item-title {
  font-size: 15px;
  font-weight: 500;
  color: var(--text-dark);
  margin-bottom: 4px;
}
.list-item-time {
  font-size: 11px;
  color: var(--text-light);
}
.list-item-delete {
  color: var(--text-light);
  font-size: 14px;
  cursor: pointer;
  padding: 4px 8px;
  opacity: 0;
  transition: opacity 0.2s;
}
.list-item:hover .list-item-delete {
  opacity: 1;
}
.list-item-delete:hover {
  color: #f44336;
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-gray);
}

.feedback-form {
  background: white;
  border-radius: var(--radius);
  padding: 28px;
  box-shadow: var(--shadow);
  border: 1px solid var(--gray-border);
}
.feedback-textarea {
  width: 100%;
  min-height: 150px;
  padding: 14px;
  font-size: 14px;
  border: 1px solid var(--gray-border);
  border-radius: 12px;
  resize: vertical;
  font-family: inherit;
  outline: none;
}
.feedback-textarea:focus {
  border-color: var(--primary);
}
.feedback-submit {
  margin-top: 18px;
  padding: 10px 28px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 40px;
  cursor: pointer;
  font-size: 14px;
  transition: background 0.2s;
}
.feedback-submit:hover {
  background: var(--primary-dark);
}

.result-card { background: white; border-radius: var(--radius); padding: 16px 20px; margin-bottom: 12px; border-left: 3px solid var(--primary); cursor: pointer; transition: all 0.2s; }
.result-card:hover { transform: translateX(4px); box-shadow: var(--shadow-hover); }
.back-button, .export-btn { background: var(--gray-bg); border: 1px solid var(--gray-border); padding: 8px 20px; border-radius: 30px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
.back-button:hover { background: var(--gray-border); }
.export-btn { background: var(--primary); color: white; border: none; }
.export-btn:hover { background: var(--primary-dark); }

.results-header {
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}

.footer {
  text-align: center;
  padding: 24px 20px;
  font-size: 12px;
  color: var(--text-light);
  border-top: 1px solid var(--gray-border);
  margin-top: 32px;
}

@media (max-width: 900px) { .sidebar { display: none; } .stats-grid { grid-template-columns: repeat(2, 1fr); } .jieqi-row { grid-template-columns: repeat(3, 1fr); } .recommend-feature-text { max-width: 100%; } .recommend-jieqi-name { font-size: 32px; } .jieqi-detail-body { padding: 20px; } .jieqi-header { padding: 24px 20px; } .case-body, .formula-body { padding: 24px 20px; } }
</style>
</head>
<body>

<header class="header">
  <div class="logo" onclick="showPage('home')">
    <div class="logo-icon">🌿</div>
    <div><div class="logo-text">本草问诊</div><div class="logo-sub">中医药辅助诊疗系统</div></div>
  </div>
  <div class="header-search">
    <input type="text" id="headerSearchInput" placeholder="输入方剂名或症状，如：归脾汤、失眠..." 
           onkeydown="if(event.key==='Enter') doSearch(this.value)"
           oninput="onSearchInput(this.value)">
    <button onclick="doSearch(document.getElementById('headerSearchInput').value)">🔍</button>
    <div class="search-suggestions" id="searchSuggestions"></div>
  </div>
  <div class="nav-links">
    <span class="nav-link active" onclick="showPage('home')">首页</span>
    <span class="nav-link" onclick="showPage('profile')">我的</span>
  </div>
</header>

<div class="main-container">
  <aside class="sidebar"><div class="health-tip-card"><div class="health-tip-title">💡 养生小知识</div><div class="health-tip-content" id="healthTipContent"></div><button class="refresh-tip" onclick="refreshHealthTip()">换一换</button></div></aside>

// 症状清洗函数
function cleanSymptomsText(s) {
  if(!s) return '';
  let text = s;
  text = text.replace(/基本信息[:：]\s*/g, '');
  text = text.replace(/主诉[:：]\s*/g, '');
  text = text.replace(/上次就诊内容[:：]\s*/g, '');
  text = text.replace(/年龄[:：]\s*\d+\s*岁?/g, '');
  text = text.replace(/年龄\s*\d+/g, '');
  text = text.replace(/性别[:：]\s*[男女]/g, '');
  text = text.replace(/身高[:：]\s*[\d\.]+\s*(?:cm|厘米)?/g, '');
  text = text.replace(/身高\s*[\d\.]+/g, '');
  text = text.replace(/体重[:：]\s*[\d\.]+\s*(?:kg|千克)?/g, '');
  text = text.replace(/体重\s*[\d\.]+/g, '');
  text = text.replace(/现病史[:：]\s*/g, '');
  text = text.replace(/体格检查[:：]\s*/g, '');
  text = text.replace(/舌[:：][^，,。；;]*/g, '');
  text = text.replace(/脉[:：][^，,。；;]*/g, '');
  text = text.replace(/舌苔[^，,。；;]*/g, '');
  text = text.replace(/\s+/g, ' ').trim();
  text = text.replace(/^[,，、\s]+/, '').replace(/[,，、\s]+$/, '');
  if(text.length>400) text = text.substring(0,400)+'…';
  return text || '（无详细症状描述）';
}
function cleanHerbName(herbStr) {
  if(!herbStr) return [];
  let herbs = herbStr.split(/\s+/);
  let cleaned = [];
  for(let h of herbs){
    if(!h.trim()) continue;
    let name = h.replace(/[\d\.]+(?:g|克|ml|毫升)?/g, '').trim();
    name = name.replace(/[.,，。]$/, '');
    if(name && name.length>0 && name.length<20 && !name.match(/^[0-9]+$/)) {
      cleaned.push(name);
    }
  }
  return [...new Map(cleaned.map(h=>[h,h])).values()];
}

const HEALTH_TIPS=["晨起一杯温水助代谢。","春养肝夏养心，顺时调养。","睡前泡脚改善睡眠。","按揉足三里健脾益气。","药食同源，红枣枸杞补气血。"];
let currentTipIndex=0;
function refreshHealthTip(){ currentTipIndex=(currentTipIndex+1)%HEALTH_TIPS.length; document.getElementById('healthTipContent').innerHTML=HEALTH_TIPS[currentTipIndex]; }
function initStorage(){ const f=localStorage.getItem('tcm_favorites'); if(f) favorites=JSON.parse(f); const h=localStorage.getItem('tcm_searchHistory'); if(h) searchHistory=JSON.parse(h); }
function saveFavorites(){ localStorage.setItem('tcm_favorites',JSON.stringify(favorites)); }
function saveHistory(){ localStorage.setItem('tcm_searchHistory',JSON.stringify(searchHistory)); }
function addToHistory(q){ if(!q.trim()) return; searchHistory=searchHistory.filter(h=>h.keyword!==q); searchHistory.unshift({keyword:q,time:new Date().toLocaleString()}); if(searchHistory.length>20) searchHistory.pop(); saveHistory(); }
function addToFavorite(item,type,name){ if(favorites.some(f=>f.name===name)){ showToast('已在收藏夹'); return false; } favorites.push({name,type,data:item,time:new Date().toLocaleString()}); saveFavorites(); showToast('已收藏'); return true; }
function removeFromFavorite(name){ favorites=favorites.filter(f=>f.name!==name); saveFavorites(); showToast('已取消收藏'); if(document.getElementById('pageFavorites').classList.contains('active')) renderFavoritesList(); }
function isFavorited(name){ return favorites.some(f=>f.name===name); }
function showFavorites(){ renderFavoritesList(); showPage('favorites'); }
function renderFavoritesList(){ const c=document.getElementById('favoritesList'); document.getElementById('favoritesCount').innerHTML=`共 ${favorites.length} 条收藏`; if(!favorites.length){ c.innerHTML='<div class="empty-state">暂无收藏</div>'; return; } c.innerHTML=favorites.map(fav=>`<div class="list-item" onclick="viewFavorite('${fav.name}')"><div class="list-item-content"><div class="list-item-title">${fav.name}</div><div class="list-item-time">${fav.type==='formula'?'方剂':'医案'} · ${fav.time}</div></div><div class="list-item-delete" onclick="event.stopPropagation();removeFromFavorite('${fav.name}')">删除</div></div>`).join(''); }
function viewFavorite(name){ const fav=favorites.find(f=>f.name===name); if(!fav) return; if(fav.type==='formula' && formulaDatabase[fav.name]){ currentItem=formulaDatabase[fav.name]; currentMode='formula'; showFormulaDetail(currentItem); showPage('detail'); } else if(fav.data){ currentItem=fav.data; currentMode='case'; showCaseDetailFromItem(fav.data); showPage('detail'); } }
function showHistory(){ renderHistoryList(); showPage('history'); }
function renderHistoryList(){ const c=document.getElementById('historyList'); document.getElementById('historyCount').innerHTML=`共 ${searchHistory.length} 条记录`; if(!searchHistory.length){ c.innerHTML='<div class="empty-state">暂无历史</div>'; return; } c.innerHTML=searchHistory.map(h=>`<div class="list-item" onclick="doSearch('${h.keyword}')"><div class="list-item-content"><div class="list-item-title">🔍 ${h.keyword}</div><div class="list-item-time">${h.time}</div></div></div>`).join(''); }
function clearHistory(){ if(confirm('清空历史?')){ searchHistory=[]; saveHistory(); renderHistoryList(); showToast('已清空'); } }
function showFeedback(){ showPage('feedback'); }
function submitFeedback(){ const content=document.getElementById('feedbackContent').value.trim(); if(!content){ showToast('请输入反馈'); return; } let fb=[]; const saved=localStorage.getItem('tcm_feedbacks'); if(saved) fb=JSON.parse(saved); fb.unshift({content,time:new Date().toLocaleString()}); localStorage.setItem('tcm_feedbacks',JSON.stringify(fb)); document.getElementById('feedbackContent').value=''; showToast('感谢反馈'); }
function buildFormulaDatabase(data){ let temp={}; for(let item of data){ let fn=item.formula; if(fn&&fn!=='null'&&fn!=='undefined'){ let name=fn.split(/[\s,，、]/)[0].trim(); if(name.length>2&&!temp[name]) temp[name]={name, herbs:cleanHerbName(item.herbs||''), effect:(item.diagnosis||'').replace(/^证型[:：]/,'')}; } } return temp; }
async function loadData(){ initStorage(); try{ const resp=await fetch('medical_records.json'); if(!resp.ok) throw new Error('模拟数据'); const txt=await resp.text(); fullData=txt.trim().startsWith('[')?JSON.parse(txt):txt.split('\n').filter(l=>l.trim()).map(l=>JSON.parse(l)); formulaDatabase=buildFormulaDatabase(fullData); document.getElementById('heroStatCount').innerHTML=fullData.length; document.getElementById('heroFormulaCount').innerHTML=Object.keys(formulaDatabase).length; document.getElementById('hotSearchGrid').innerHTML=["归脾汤","桂枝汤","六味地黄丸","失眠","咳嗽","胃痛"].map(t=>`<button class="hot-search-item" onclick="doSearch('${t}')">${t}</button>`).join(''); refreshHealthTip(); window.suggestionFormulas=Object.keys(formulaDatabase); renderJieqiCalendar(); renderSmartRecommendation(); }catch(e){ console.warn(e); fullData=[]; } }
function doSearch(q){ if(!q.trim()) return; addToHistory(q); if(formulaDatabase[q]){ currentItem=formulaDatabase[q]; currentMode='formula'; showFormulaDetail(currentItem); showPage('detail'); return; } let kw=q.toLowerCase(); let res=fullData.filter(item=>(item.symptoms||'').toLowerCase().includes(kw)||(item.diagnosis||'').toLowerCase().includes(kw)).slice(0,20); document.getElementById('resultsQuery').innerHTML=`“${q}” 检索结果`; document.getElementById('resultsCount').innerHTML=`共 ${res.length} 条`; let c=document.getElementById('resultsList'); if(!res.length) c.innerHTML='<div class="empty-state">无结果</div>'; else c.innerHTML=res.map((item,idx)=>`<div class="result-card" onclick="showCaseDetail(${idx})"><div class="result-name">${item.diagnosis?.replace(/^证型[:：]/,'')||'医案'}</div><div class="result-type">方剂：${item.formula?.split(/[\s,，、]/)[0]||''}</div><button class="export-btn" style="margin-top:8px;padding:5px 14px;font-size:12px;" onclick="event.stopPropagation();addToFavorite(item,'case','${item.diagnosis?.replace(/^证型[:：]/,'')||'医案'}')">❤ 收藏</button></div>`).join(''); window.currentCases=res; showPage('results'); }
function showFormulaDetail(f){ let favFlag=isFavorited(f.name); let herbsHtml=f.herbs?.length?`<div class="formula-section"><div class="formula-section-title">方剂组成</div><div class="herb-grid">${f.herbs.map(h=>`<span class="herb-item">${h}</span>`).join('')}</div></div>`:''; let effectHtml=f.effect&&f.effect!=='null'?`<div class="formula-section"><div class="formula-section-title">功效</div><div class="effect-text">${f.effect}</div></div>`:''; document.getElementById('detailContainer').innerHTML=`<div class="formula-detail-card"><div class="formula-header"><div class="formula-name">${f.name}</div></div><div class="formula-body">${herbsHtml}${effectHtml}<div style="text-align:center; margin-top:24px;"><button class="export-btn" onclick="toggleFavoriteFormula('${f.name}')">${favFlag?'❤ 已收藏':'☆ 收藏'}</button></div></div></div>`; showPage('detail'); }
function toggleFavoriteFormula(name){ if(isFavorited(name)) removeFromFavorite(name); else addToFavorite({},'formula',name); if(currentItem?.name===name) showFormulaDetail(currentItem); }
function showCaseDetail(idx){ let item=window.currentCases[idx]; currentItem=item; currentMode='case'; let diag=item.diagnosis?.replace(/^证型[:：]/,'')||''; let fn=item.formula?.split(/[\s,，、]/)[0]||''; let itemName=diag||fn||'医案'; let cleaned=cleanHerbName(item.herbs||''); let symp=cleanSymptomsText(item.symptoms||''); let html=`<div class="case-detail-card"><div class="case-header"><div class="case-title">病情分析</div></div><div class="case-body">${diag?`<div class="case-section"><div class="case-section-title">证型诊断</div><div class="case-text">${diag}</div></div>`:''}${fn?`<div class="case-section"><div class="case-section-title">推荐方剂</div><div class="case-text">${fn}</div></div>`:''}${cleaned.length?`<div class="case-section"><div class="case-section-title">中药组成</div><div class="herb-grid">${cleaned.map(h=>`<span class="herb-item">${h}</span>`).join('')}</div></div>`:''}${symp?`<div class="case-section"><div class="case-section-title">症状表现</div><div class="symptoms-text">${symp}</div></div>`:''}<div style="text-align:center; margin-top:24px;"><button class="export-btn" onclick="toggleFavoriteCase('${itemName}')">${isFavorited(itemName)?'❤ 已收藏':'☆ 收藏'}</button></div></div></div>`; document.getElementById('detailContainer').innerHTML=html; showPage('detail'); }
function showCaseDetailFromItem(item){ let diag=item.diagnosis?.replace(/^证型[:：]/,'')||''; let fn=item.formula?.split(/[\s,，、]/)[0]||''; let itemName=diag||fn||'医案'; let cleaned=cleanHerbName(item.herbs||''); let symp=cleanSymptomsText(item.symptoms||''); let html=`<div class="case-detail-card"><div class="case-header"><div class="case-title">病情分析</div></div><div class="case-body">${diag?`<div class="case-section"><div class="case-section-title">证型诊断</div><div class="case-text">${diag}</div></div>`:''}${fn?`<div class="case-section"><div class="case-section-title">推荐方剂</div><div class="case-text">${fn}</div></div>`:''}${cleaned.length?`<div class="case-section"><div class="case-section-title">中药组成</div><div class="herb-grid">${cleaned.map(h=>`<span class="herb-item">${h}</span>`).join('')}</div></div>`:''}${symp?`<div class="case-section"><div class="case-section-title">症状表现</div><div class="symptoms-text">${symp}</div></div>`:''}<div style="text-align:center; margin-top:24px;"><button class="export-btn" onclick="toggleFavoriteCase('${itemName}')">${isFavorited(itemName)?'❤ 已收藏':'☆ 收藏'}</button></div></div></div>`; document.getElementById('detailContainer').innerHTML=html; showPage('detail'); }
function toggleFavoriteCase(name){ if(isFavorited(name)) removeFromFavorite(name); else addToFavorite(currentItem,'case',name); if(currentMode==='case') showCaseDetailFromItem(currentItem); }
function exportCurrent(){ let text=''; if(currentMode==='formula') text=`方剂：${currentItem.name}\n组成：${currentItem.herbs?.join('、')||''}`; else text=`证型：${currentItem.diagnosis}\n方剂：${currentItem.formula}\n症状：${cleanSymptomsText(currentItem.symptoms)}`; navigator.clipboard.writeText(text); showToast('已复制'); }
function showToast(msg){ let t=document.createElement('div'); t.className='toast'; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }
function showPage(page){ document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(`page${page.charAt(0).toUpperCase()+page.slice(1)}`).classList.add('active'); if(page==='home') document.querySelector('.nav-link').classList.add('active'); if(page==='profile') document.querySelectorAll('.nav-link')[1].classList.add('active'); window.scrollTo({top:0}); }
function goBackFromResults(){ showPage('home'); }
function goBackFromDetail(){ showPage(currentMode==='formula'?'home':'results'); }
function goBackToProfile(){ showPage('profile'); }
function backToHome(){ showPage('home'); }
function onSearchInput(v){ const sugDiv=document.getElementById('searchSuggestions'); if(!v.trim()){ sugDiv.classList.remove('show'); return; } const filtered=(window.suggestionFormulas||[]).filter(s=>s.includes(v)).slice(0,6); if(filtered.length){ sugDiv.innerHTML=filtered.map(s=>`<div class="suggestion-item" onclick="doSearch('${s}')">${s}</div>`).join(''); sugDiv.classList.add('show'); } else sugDiv.classList.remove('show'); }
loadData();
</script>
</body>
</html>
